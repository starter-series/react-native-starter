version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      lint:
        patterns: ["eslint", "@eslint/*", "globals"]
      test:
        patterns: ["jest", "@jest/*", "jest-expo", "@testing-library/*"]
      expo:
        patterns: ["expo", "expo-*", "react", "react-native"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
